<div class="auth-container animate-fade-in">
    <mat-card class="auth-card">
        <mat-card-header>
            <mat-card-title>Forgot Password</mat-card-title>
            <mat-card-subtitle>
                Enter your email and we'll send you a reset link.
            </mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <!-- Success state -->
            <div *ngIf="successMessage" class="success-state">
                <mat-icon class="success-icon">mark_email_read</mat-icon>
                <p class="success-text">{{ successMessage }}</p>
                <button mat-stroked-button color="primary" routerLink="/login" class="back-btn">
                    Back to Login
                </button>
            </div>

            <!-- Form state -->
            <form *ngIf="!successMessage" [formGroup]="forgotForm" class="auth-form" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Email Address</mat-label>
                    <mat-icon matPrefix>email</mat-icon>
                    <input matInput formControlName="email" placeholder="example@email.com" type="email" />
                    <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">
                        Email is required.
                    </mat-error>
                    <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">
                        Please enter a valid email address.
                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" class="submit-btn"
                    [disabled]="forgotForm.invalid || isSubmitting">
                    <mat-icon *ngIf="!isSubmitting">send</mat-icon>
                    {{ isSubmitting ? 'Sending...' : 'Send Reset Link' }}
                </button>
            </form>
        </mat-card-content>

        <mat-card-actions class="auth-actions" *ngIf="!successMessage">
            <span class="text-muted">Remember your password?</span>
            <button mat-button color="primary" routerLink="/login">Sign In</button>
        </mat-card-actions>
    </mat-card>
</div>
