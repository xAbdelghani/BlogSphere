<div class="auth-container animate-fade-in">
    <mat-card class="auth-card">
        <mat-card-header>
            <mat-card-title>Reset Password</mat-card-title>
            <mat-card-subtitle>Choose a new password for your account.</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <!-- No token guard -->
            <div *ngIf="!token" class="error-state">
                <mat-icon class="error-icon">error_outline</mat-icon>
                <p class="error-text">Invalid or missing reset token.</p>
                <button mat-stroked-button color="warn" routerLink="/forgot-password" class="back-btn">
                    Request a New Link
                </button>
            </div>

            <!-- Form -->
            <form *ngIf="token" [formGroup]="resetForm" class="auth-form" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>New Password</mat-label>
                    <mat-icon matPrefix>lock</mat-icon>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="newPassword"
                        placeholder="At least 6 characters" />
                    <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="resetForm.get('newPassword')?.hasError('required')">Password is
                        required.</mat-error>
                    <mat-error *ngIf="resetForm.get('newPassword')?.hasError('minlength')">
                        Password must be at least 6 characters.
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Confirm Password</mat-label>
                    <mat-icon matPrefix>lock_reset</mat-icon>
                    <input matInput [type]="hideConfirm ? 'password' : 'text'" formControlName="confirmPassword"
                        placeholder="Repeat your new password" />
                    <button mat-icon-button matSuffix type="button" (click)="hideConfirm = !hideConfirm">
                        <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="resetForm.hasError('mismatch') && resetForm.get('confirmPassword')?.touched">
                        Passwords do not match.
                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" class="submit-btn"
                    [disabled]="resetForm.invalid || isSubmitting">
                    <mat-icon *ngIf="!isSubmitting">lock_open</mat-icon>
                    {{ isSubmitting ? 'Resetting...' : 'Reset Password' }}
                </button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
