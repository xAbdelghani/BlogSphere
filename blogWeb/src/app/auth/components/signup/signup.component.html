<div class="auth-container animate-fade-in">
    <mat-card class="auth-card">
        <mat-card-header>
            <mat-card-title>Create an Account</mat-card-title>
            <mat-card-subtitle>Join BlogSpace today</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="signupForm" class="auth-form">

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Name</mat-label>
                    <input matInput formControlName="name" placeholder="John Doe" required>
                    <mat-icon matPrefix>person</mat-icon>
                    <mat-error *ngIf="signupForm.get('name')?.invalid && signupForm.get('name')?.touched">
                        Please enter a valid name.
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" placeholder="example@email.com" required>
                    <mat-icon matPrefix>email</mat-icon>
                    <mat-error *ngIf="signupForm.get('email')?.invalid && signupForm.get('email')?.touched">
                        Please enter a valid email.
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Password</mat-label>
                    <input matInput type="{{ hidePassword ? 'password' : 'text' }}" formControlName="password" required>
                    <mat-icon matPrefix>lock</mat-icon>
                    <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()"
                        [attr.aria-label]="'Hide password'">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="signupForm.get('password')?.invalid && signupForm.get('password')?.touched">
                        Please enter a strong password.
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Confirm Password</mat-label>
                    <input matInput type="{{ hidePassword ? 'password' : 'text' }}" formControlName="confirmPassword"
                        required>
                    <mat-icon matPrefix>lock_outline</mat-icon>
                    <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()"
                        [attr.aria-label]="'Hide password'">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error
                        *ngIf="signupForm.get('confirmPassword')?.invalid && signupForm.get('confirmPassword')?.touched">
                        Please confirm your password.
                    </mat-error>
                </mat-form-field>

                <button mat-raised-button color="primary" type="submit" [disabled]="signupForm.invalid || isSubmitting"
                    (click)="onSubmit()" class="submit-btn">
                    {{ isSubmitting ? 'Creating account...' : 'Sign Up' }}
                </button>

            </form>
        </mat-card-content>

        <mat-card-actions class="auth-actions">
            <span class="text-muted">Already have an account?</span>
            <button mat-button color="primary" routerLink="/login">Login</button>
        </mat-card-actions>
    </mat-card>
</div>
