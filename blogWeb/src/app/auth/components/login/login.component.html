<div class="auth-container animate-fade-in">
    <mat-card class="auth-card">
        <mat-card-header>
            <mat-card-title>Welcome Back</mat-card-title>
            <mat-card-subtitle>Sign in to continue to BlogSpace</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" class="auth-form">

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>E-mail</mat-label>
                    <input matInput formControlName="email" placeholder="example@email.com" required>
                    <mat-icon matPrefix>email</mat-icon>
                    <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                        Please enter a valid email address.
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Password</mat-label>
                    <input matInput type="{{ hidePassword ? 'password' : 'text' }}" formControlName="password" required>
                    <mat-icon matPrefix>lock</mat-icon>
                    <button mat-icon-button matSuffix type="button" (click)="togglePasswordVisibility()"
                        [attr.aria-label]="'Hide password'">
                        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        Please enter your password.
                    </mat-error>
                </mat-form-field>

                <div class="forgot-link">
                    <a routerLink="/forgot-password">Forgot password?</a>
                </div>

                <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || isSubmitting"
                    (click)="onSubmit()" class="submit-btn">
                    {{ isSubmitting ? 'Signing in...' : 'Login' }}
                </button>
            </form>
        </mat-card-content>

        <mat-card-actions class="auth-actions">
            <span class="text-muted">Don't have an account?</span>
            <button mat-button color="primary" routerLink="/signup">Sign Up</button>
        </mat-card-actions>
    </mat-card>
</div>
